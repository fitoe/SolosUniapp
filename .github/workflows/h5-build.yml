name: H5 Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-h5:
    name: Build h5
    runs-on: ubuntu-latest
    env:
      VITE_API_HOST: ${{ secrets.VITE_API_HOST }}
      VITE_API_PATH: ${{ secrets.VITE_API_PATH }}
      VITE_UPLOAD_HOST: ${{ secrets.VITE_UPLOAD_HOST }}
      VITE_UPLOAD_PATH: ${{ secrets.VITE_UPLOAD_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build H5
        run: pnpm build:h5

      - name: Upload H5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-h5
          path: dist/build/h5/
          if-no-files-found: error
