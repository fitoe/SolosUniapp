name: Mini Build Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-mini-target:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mp-weixin
            cmd: pnpm build:mp-weixin
    env:
      VITE_API_HOST: ${{ secrets.VITE_API_HOST }}
      VITE_API_PATH: ${{ secrets.VITE_API_PATH }}
      VITE_UPLOAD_HOST: ${{ secrets.VITE_UPLOAD_HOST }}
      VITE_UPLOAD_PATH: ${{ secrets.VITE_UPLOAD_PATH }}
      VITE_APPID_WEIXIN: ${{ secrets.VITE_APPID_WEIXIN }}
      VITE_PROJECT_NAME_WEIXIN: ${{ secrets.VITE_PROJECT_NAME_WEIXIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build target
        run: ${{ matrix.cmd }}

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/build/
          if-no-files-found: error
